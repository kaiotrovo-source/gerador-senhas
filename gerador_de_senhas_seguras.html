<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Senhas Seguras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }
    input[type="number"] {
      width: 60px;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
    #senha {
      margin-top: 15px;
      font-weight: bold;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Gerador de Senhas</h2>

  <label>Tamanho:</label>
  <input type="number" id="tamanho" value="12" min="4" max="32">

  <div>
    <label><input type="checkbox" id="numeros" checked> Números</label><br>
    <label><input type="checkbox" id="simbolos" checked> Símbolos</label>
  </div>

  <button onclick="gerarSenha()">Gerar Senha</button>
  <button onclick="copiarSenha()">Copiar Senha</button>

  <div id="senha"></div>
</div>

<script>
function gerarSenha() {
  const tamanho = document.getElementById("tamanho").value;
  const usarNumeros = document.getElementById("numeros").checked;
  const usarSimbolos = document.getElementById("simbolos").checked;

  let caracteres = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
  if (usarNumeros) caracteres += "0123456789";
  if (usarSimbolos) caracteres += "!@#$%^&*()_+[]{}|;:,.<>?";

  let senha = "";
  for (let i = 0; i < tamanho; i++) {
    senha += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
  }

  document.getElementById("senha").innerText = senha;
}

function copiarSenha() {
  const senha = document.getElementById("senha").innerText;
  navigator.clipboard.writeText(senha);
  alert("Senha copiada!");
}
</script>

</body>
</html>
